name: Post-Release Agent Metadata Upload

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload (e.g. 1.13.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  upload-metadata:
    name: Upload Agent Metadata to New Relic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
        run: |
          echo "Downloading agent-control release artifacts for version ${VERSION}"
          
          gh release download "${VERSION}" \
            --repo newrelic/newrelic-agent-control \
            --pattern "newrelic-agent-control_${VERSION}_linux_amd64_oci.tar.gz" \
            --pattern "newrelic-agent-control_${VERSION}_linux_arm64_oci.tar.gz" \
            --pattern "newrelic-agent-control_${VERSION}_windows_amd64_oci.zip"

          mkdir -p /tmp/artifacts
          mv "newrelic-agent-control_${VERSION}_linux_amd64_oci.tar.gz" "/tmp/artifacts/linux_amd64.tar.gz"
          mv "newrelic-agent-control_${VERSION}_linux_arm64_oci.tar.gz" "/tmp/artifacts/linux_arm64.tar.gz"
          mv "newrelic-agent-control_${VERSION}_windows_amd64_oci.zip" "/tmp/artifacts/windows_amd64.zip"
          
          echo "Downloaded artifacts:"
          ls -lh /tmp/artifacts/

      - name: Upload agent metadata to New Relic
        uses: newrelic/agent-metadata-action@0cb0aaac380f66f9b86bbceb060ab0b2c4ea76d2 # v1.0.10
        with:
          agent-type: NRAgentControl
          version: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          git-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          newrelic-client-id: ${{ secrets.AC_NEWRELIC_CLIENT_ID }}
          newrelic-private-key: ${{ secrets.AC_NEWRELIC_PRIVATE_KEY }}
          # shared newrelic key to instrument the go binary used in the action
          apm-control-nr-license-key: ${{ secrets.APM_CONTROL_NR_LICENSE_KEY }}
          oci-registry: ${{ secrets.OCI_REGISTRY }}
          oci-username: ${{ secrets.OCI_USERNAME }}
          oci-password: ${{ secrets.OCI_PASSWORD }}
          binaries: |
            [
              {
                "name": "newrelic-agent-control-linux-amd64",
                "path": "/tmp/artifacts/linux_amd64.tar.gz",
                "os": "linux",
                "arch": "amd64",
                "format": "tar+gzip"
              },
              {
                "name": "newrelic-agent-control-linux-arm64",
                "path": "/tmp/artifacts/linux_arm64.tar.gz",
                "os": "linux",
                "arch": "arm64",
                "format": "tar+gzip"
              },
              {
                "name": "newrelic-agent-control-windows-amd64",
                "path": "/tmp/artifacts/windows_amd64.zip",
                "os": "windows",
                "arch": "amd64",
                "format": "zip"
              }
            ]
