name: 📞 OnHost Fleet Control E2E Tests

# This workflow tests Fleet Control integration with Agent Control on Linux hosts.
# Unlike regular E2E tests that validate agent functionality, these tests verify
# that Fleet Control can successfully orchestrate and manage Agent Control via its
# external test controller API.
#
# The test flow:
# 1. Deploy Agent Control with Fleet Control enabled
# 2. Trigger Fleet Control tests via external API
# 3. Poll for test completion and validate results
#
# These tests use a dedicated Fleet Control test runner (e2e-runner) that interacts
# with the Fleet Control test controller endpoint to run deployment tests against
# the configured fleet.

on:
  workflow_dispatch:
    inputs:
      fleet_id:
        description: "Fleet ID to use for Fleet Control tests"
        required: false
        type: string
        # Fleet `AC-FC E2E tests (linux)` on staging using FC's `Test Automation` account.
        default: "MTIyMTA0NzV8TkdFUHxGTEVFVHwwMTlkOGNkOC0xNTc1LTdjZjAtYjBlNi02ZThlYzM2YjAyODU"
  # schedule:
  #   # Scheduled to run at 4 a.m on every day-of-week from Monday through Friday.
  #   - cron: "0 18 * * 1-5"

permissions:
  contents: read

# NOTE: The below environment vars are bumped automatically by Renovate
env:
  HOST_E2E_INFRA_AGENT_VERSION: "1.73.0"

jobs:
  build-packages:
    name: Build packages
    uses: ./.github/workflows/component_packages.yml
    with:
      pre-release: false
      skip_sign: true
      tag_name: 0.200.${{ github.run_id }}

  on-host-linux-fleet-control-e2e:
    name: OnHost Linux Fleet Control E2E
    needs: [build-packages]
    runs-on: linux-4-core-nr-control
    steps:
      - name: Record job start time
        run: echo "JOB_START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/install-rust-toolchain

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: built-binaries-0.200.${{ github.run_id }}
          path: ./

      - name: Install newrelic-auth-rs
        run: cargo install --locked --git https://github.com/newrelic/newrelic-auth-rs.git

      - name: Get Fleet Control authentication token
        id: get-token
        run: |
          echo "${{ secrets.AC_FLEET_CONTROL_STAG_E2E_NR_SYSTEM_IDENTITY_PRIVATE_KEY }}" > /tmp/cred.pem

          if ! newrelic-auth-cli authenticate \
            --client-id "${{ secrets.AC_FLEET_CONTROL_STAG_E2E_NR_SYSTEM_IDENTITY_CLIENT_ID }}" \
            --environment STAGING \
            --private-key-path /tmp/cred.pem \
            --output-token-format PLAIN \
            > /tmp/agent-control-token.txt 2> /tmp/auth-error.log; then
            echo "::error::Authentication failed!"
            cat /tmp/auth-error.log
            exit 1
          fi

          TOKEN=$(cat /tmp/agent-control-token.txt)
          if [ -z "$TOKEN" ]; then
            echo "::error::Agent control token is empty!"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

          rm /tmp/cred.pem
          rm /tmp/agent-control-token.txt

      - name: Build e2e-runner binary
        run: cargo build -p e2e-runner

      - name: Run Fleet Control E2E test
        run: |
          echo "${{ secrets.AC_FLEET_CONTROL_STAG_E2E_NR_SYSTEM_IDENTITY_PRIVATE_KEY }}" > /tmp/newrelic-agent-control-priv.key

          sudo ${{ github.workspace }}/target/debug/e2e-runner \
            --log-level debug \
            fleet-control \
            --artifacts-package-dir ./dist \
            --nr-api-key "${{ secrets.AC_FLEET_CONTROL_STAG_E2E_API_KEY }}" \
            --nr-license-key "${{ secrets.AC_FLEET_CONTROL_STAG_E2E_LICENSE_KEY }}" \
            --nr-account-id "${{ secrets.AC_FLEET_CONTROL_STAG_E2E_ACCOUNT_ID }}" \
            --nr-region "staging" \
            --system-identity-client-id "${{ secrets.AC_FLEET_CONTROL_STAG_E2E_NR_SYSTEM_IDENTITY_CLIENT_ID }}" \
            --agent-control-private-key "/tmp/newrelic-agent-control-priv.key" \
            --agent-control-version "0.200.${{ github.run_id }}" \
            --recipes-repo-branch "main" \
            --infra-agent-version "${{ env.HOST_E2E_INFRA_AGENT_VERSION }}" \
            --fleet-id "${{ inputs.fleet_id }}" \
            --fleet-control-token "${{ steps.get-token.outputs.token }}" \
            --fleet-type "linux-fleet" \
            --test-suite "DeploymentServicesTestSuite"

      - name: Report test result to New Relic
        if: always()
        env:
          NR_LICENSE_KEY: ${{ secrets.AC_FLEET_CONTROL_STAG_E2E_LICENSE_KEY }}
          NR_ACCOUNT_ID: ${{ secrets.AC_FLEET_CONTROL_STAG_E2E_ACCOUNT_ID }}
          E2E_SCENARIO: fleet-control-integration
          E2E_ENVIRONMENT: linux
          E2E_STATUS: ${{ job.status }}
          E2E_CALLER_WORKFLOW: fleet_control_host_linux_e2e
          E2E_REGION: staging
          E2E_ACCOUNT: "Fleet Control Test Automation (staging)"
        run: bash .github/workflows/scripts/report_e2e_result.sh

      - name: Upload e2e result summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-result-linux-fleet-control-integration
          path: |
            e2e-result-*-linux-fleet-control-integration.txt
            fleet-control-test-report.json
          if-no-files-found: warn

      - name: Send result to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.AC_FLEET_COMMON_SLACK_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          E2E_REPORT_TITLE: "OnHost Fleet Control E2E Test with Running AC"
        run: |
          mkdir -p e2e-results
          mv e2e-result-*-linux-fleet-control-integration.txt e2e-results/ 2>/dev/null || true
          mv fleet-control-test-report.json e2e-results/ 2>/dev/null || true
          if [ -f e2e-results/e2e-result-*.txt ]; then
            bash .github/workflows/scripts/slack_e2e_summary.sh
          else
            echo "No result file found, skipping Slack notification"
          fi
