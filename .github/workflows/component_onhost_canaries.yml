name: 📞 Onhost canaries operation

on:
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_VPC_SUBNET:
        required: true

    inputs:
      environment:
        required: true
        type: string
      package_version:
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: onhost-canaries-${{ inputs.environment }}
  cancel-in-progress: false

env:
  # AC Staging Account `host-canaries-staging` fleet
  FLEET_ID_STAGING: "MTIyMTMwNjh8TkdFUHxGTEVFVHwwMTlhZTNiNS01Yjg5LTdkNjYtYWU0MC1lNmZkOTY2ZDFhMDA"
  WINDOWS_FLEET_ID_STAGING: "MTIyMTMwNjh8TkdFUHxGTEVFVHwwMTljMjNjYy0yM2I2LTc1OTYtODBkNy0yMzAzYWIyYzcwMTA"
  # AC US Production Account `host-canaries-production` fleet
  FLEET_ID_PRODUCTION: "NjQyNTg2NXxOR0VQfEZMRUVUfDAxOWFlM2EyLTA3OTctNzczYS05Y2JjLWMzNzZkMjAwMWFkZg"
  WINDOWS_FLEET_ID_PRODUCTION: "NjQyNTg2NXxOR0VQfEZMRUVUfDAxOWMyMjljLWVhYTQtN2JmNi04YWIyLTU2ZWI0YjE2ZWZjZQ"

jobs:
  install-ac:
    name: Install/Upgrade Agent Control
    runs-on: ubuntu-latest
    permissions:
      # required to oidc AWS
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set branch name
        run: |
          # Short name for current branch. For PRs, use target branch (base ref)
          GIT_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          # Is the ref a tag? If so, remove refs/tags/ prefix
          GIT_BRANCH="${GIT_BRANCH#refs/tags/}"
          echo "GIT_BRANCH=$GIT_BRANCH" >> "$GITHUB_ENV"

      - name: Resolve fleet IDs for environment
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "FLEET_ID=${{ env.FLEET_ID_PRODUCTION }}" >> "$GITHUB_ENV"
            echo "WINDOWS_FLEET_ID=${{ env.WINDOWS_FLEET_ID_PRODUCTION }}" >> "$GITHUB_ENV"
          else
            echo "FLEET_ID=${{ env.FLEET_ID_STAGING }}" >> "$GITHUB_ENV"
            echo "WINDOWS_FLEET_ID=${{ env.WINDOWS_FLEET_ID_STAGING }}" >> "$GITHUB_ENV"
          fi

      - name: Install/Upgrade Agent Control via Ansible
        uses: newrelic/fargate-runner-action@121b96de1a4d7135204fd8a510927b0463df1b6b # main
        with:
          aws_region: us-east-2
          container_make_target: "FLEET_ID=${{ env.FLEET_ID }} WINDOWS_FLEET_ID=${{ env.WINDOWS_FLEET_ID }} ENVIRONMENT=${{ inputs.environment }} PACKAGE_VERSION=${{ inputs.package_version }} test/onhost-canaries/ansible-install"
          ecs_cluster_name: agent_control
          task_definition_name: agent_control
          cloud_watch_logs_group_name: /ecs/test-prerelease-agent_control
          cloud_watch_logs_stream_name: ecs/test-agent_control
          aws_vpc_subnet: ${{ secrets.AWS_VPC_SUBNET }}
          repo_name: ${{ github.repository }}
          git_clone_url: "ssh://git@github.com/${{ github.repository }}.git"
          ref: "${{ env.GIT_BRANCH }}"
