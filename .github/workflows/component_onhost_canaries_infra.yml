name: 📞 Onhost canaries - Infrastructure

on:
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_VPC_SUBNET:
        required: true
      AC_CANARY_WINDOWS_PASSWORD:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

    inputs:
      environment:
        required: true
        type: string
      operation:
        required: true
        type: string

jobs:
  infra:
    name: Canaries infrastructure ${{ inputs.operation }}
    runs-on: ubuntu-latest
    permissions:
      # required to oidc AWS
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set branch name
        run: |
          # Short name for current branch. For PRs, use target branch (base ref)
          GIT_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          # Is the ref a tag? If so, remove refs/tags/ prefix
          GIT_BRANCH="${GIT_BRANCH#refs/tags/}"
          echo "GIT_BRANCH=$GIT_BRANCH" >> "$GITHUB_ENV"

      - name: Execute infrastructure ${{ inputs.operation }}
        uses: newrelic/fargate-runner-action@121b96de1a4d7135204fd8a510927b0463df1b6b # main
        with:
          aws_region: us-east-2
          container_make_target: "ENVIRONMENT=${{ inputs.environment }} EMAILS=${{ vars.EMAILS }} SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} AC_CANARY_WINDOWS_PASSWORD=${{ secrets.AC_CANARY_WINDOWS_PASSWORD }} test/onhost-canaries/infra-${{ inputs.operation }}"
          ecs_cluster_name: agent_control
          task_definition_name: agent_control
          cloud_watch_logs_group_name: /ecs/test-prerelease-agent_control
          cloud_watch_logs_stream_name: ecs/test-agent_control
          aws_vpc_subnet: ${{ secrets.AWS_VPC_SUBNET }}
          repo_name: ${{ github.repository }}
          git_clone_url: "ssh://git@github.com/${{ github.repository }}.git"
          ref: "${{ env.GIT_BRANCH }}"
