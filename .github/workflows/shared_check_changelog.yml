# This action requires that any PR should touch at least one CHANGELOG file.
# 
# The release notes generation process relies on the presence of a CHANGELOG file that the release-toolkit can parse.
# Each PR that introduces a change worth to be included in the release notes should include an update to the CHANGELOG file.
#
# Skip conditions:
#   - PR has the 'dependencies' label (changelog entries are automatically generated for dependency updates)
#   - Branch name starts with 'renovate/'
#   - PR has the 'skip-changelog' label
name: 📞 Check changelog


# This workflows is used by external repositories
on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    if: >-
      ${{
        !contains(github.event.pull_request.labels.*.name, 'dependencies') &&
        !contains(github.event.pull_request.labels.*.name, 'skip-changelog') &&
        !startsWith(github.head_ref, 'renovate/')
      }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for CHANGELOG file changes
        run: |
          echo "$(git diff --name-only origin/${{ github.base_ref }})"
          if [[ $(git diff --name-only origin/${{ github.base_ref }} | grep --ignore-case CHANGELOG.md) ]]
          then
            echo "The CHANGELOG file was modified."
          else
            echo "The CHANGELOG file was not modified."
            echo "Please add a CHANGELOG entry to the appropriate header under \"Unreleased\", or add the \"skip-changelog\" label if not required."
            false
          fi

      - name: Check if CHANGELOG is valid
        id: validate-changelog
        uses: newrelic/release-toolkit/validate-markdown@v1

      - name: Print expected CHANGELOG format
        if: failure() && steps.validate-changelog.conclusion == 'failure'
        run: |
          echo "Expected format for the '## Unreleased' section:

            ## Unreleased

            ### breaking
            - Description of a breaking change.

            ### security
            - Description of a security fix.

            ### enhancement
            - Description of a new feature.

            ### bugfix
            - Description of a fix.

          Note: only include the subsections relevant to your change."
