name: 🐤 Plan k8s canaries infrastructure changes

on:
  push:
    paths:
      - test/k8s-canaries/terraform/**
      - .github/workflows/component_k8s_canaries_infra.yml
      - .github/workflows/push_pr_k8s_canaries_plan.yml

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.run_id }}"
  cancel-in-progress: false

jobs:
  plan_k8s_canaries:
    name: infra changes ${{ matrix.canary_dir }}
    uses: ./.github/workflows/component_k8s_canaries_infra.yml
    permissions:
      # required to oidc AWS
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - canary_dir: staging
          - canary_dir: production
    with:
      canary_dir: ${{ matrix.canary_dir }}
      apply: false
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_VPC_SUBNET: ${{ secrets.AWS_VPC_SUBNET }}
      SLACK_WEBHOOK_URL: ${{ secrets.AC_SLACK_WEBHOOK }}
