# Reusable workflow that opens a pre-release PR:
#   1. Calculates the next version from CHANGELOG.md unreleased entries (release-toolkit).
#   2. Bumps the version in the specified Cargo.toml.
#   3. Commits CHANGELOG.md + Cargo.toml on a new branch `generate-release/<version>`.
#   4. Opens a PR against the default branch with the `release` label.
#
name: 📞 Create pre-release PR

on:
  workflow_call:
    inputs:
      cargo_toml_path:
        description: Path to the Cargo.toml containing the version field to bump.
        required: false
        type: string
        default: Cargo.toml
    secrets:
      app_id:
        description: GitHub App ID used to authenticate (via actions/create-github-app-token).
        required: true
      app_private_key:
        description: GitHub App private key used to authenticate.
        required: true

permissions:
  # required to create a branch in the repo
  contents: write

env:
  # Prefix of the auto-opened pre-release PR branch. Must match the filter used
  # by callers of `shared_create_prerelease.yml`.
  RELEASE_BRANCH_PREFIX: generate-release/

concurrency:
  # Serialize pre-release PR creation per repository so two runs cannot race on
  # CHANGELOG.md / Cargo.toml / the remote branch check.
  group: prerelease-pr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  open-prerelease-pr:
    name: Open pre-release PR
    runs-on: ubuntu-latest
    steps:
      - name: Verify default branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ] || [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "This workflow must be triggered from the default branch ('${{ github.event.repository.default_branch }}'), got '${GITHUB_REF_NAME}'."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Generate release notes and update CHANGELOG
        id: release-data
        env:
          # Limits the calculated version from dependencies to be a patch bump (by default it propagates the bump type from the dependency).
          DEPENDENCY_CAP: patch
        uses: newrelic/release-toolkit/contrib/ohi-release-notes@e28834c3115d501cd42e8458f058591d34bf045f # v1
        with:
          # overrides the default "v" prefix for the version.
          output-prefix: ""

      - name: Fail if no changes to release
        if: steps.release-data.outputs.skip-release == 'true'
        run: |
          echo "No unreleased entries or dependencies updated found. Nothing to release."
          exit 1

      - name: Bump version in Cargo.toml and refresh Cargo.lock
        env:
          VERSION: ${{ steps.release-data.outputs.next-version }}
          CARGO_TOML_PATH: ${{ inputs.cargo_toml_path }}
        run: |
          sed -i "s/^version = .*/version = \"$VERSION\"/" "$CARGO_TOML_PATH"
          grep -n '^version = ' "$CARGO_TOML_PATH"

          # Refresh Cargo.lock (assumed at repo root) so it reflects the bumped version.
          cargo update --workspace --manifest-path "$CARGO_TOML_PATH"

      # Commits are created via the GraphQL `createCommitOnBranch` mutation so GitHub signs them automatically.
      - name: Create release branch and commit files (signed via API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ env.RELEASE_BRANCH_PREFIX }}${{ steps.release-data.outputs.next-version }}
          VERSION: ${{ steps.release-data.outputs.next-version }}
          CARGO_TOML_PATH: ${{ inputs.cargo_toml_path }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)

          # Create the branch ref at the base commit so the mutation has somewhere to land.
          # Fails with 422 "Reference already exists" if the branch is already present.
          gh api -X POST "repos/$REPO/git/refs" \
            -f ref="refs/heads/$BRANCH" \
            -f sha="$BASE_SHA"

          # Write the mutation to a file and feed it to gh via --input <file>
          # to avoid stdin buffering issues with large payloads.
          jq -n \
            --rawfile changelog CHANGELOG.md \
            --rawfile cargo "$CARGO_TOML_PATH" \
            --rawfile lock Cargo.lock \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg msg "chore(release): prepare $VERSION" \
            --arg oid "$BASE_SHA" \
            --arg cargo_path "$CARGO_TOML_PATH" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: {repositoryNameWithOwner: $repo, branchName: $branch},
                  message: {headline: $msg},
                  expectedHeadOid: $oid,
                  fileChanges: {
                    additions: [
                      {path: "CHANGELOG.md", contents: ($changelog | @base64)},
                      {path: $cargo_path, contents: ($cargo | @base64)},
                      {path: "Cargo.lock", contents: ($lock | @base64)}
                    ]
                  }
                }
              }
            }' > "$RUNNER_TEMP/mutation.json"

          gh api graphql --input "$RUNNER_TEMP/mutation.json"

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}

      # CI workflows does not run when a PR is created using the GITHUB_TOKEN (actions app)
      # So we use the AC app in order overcome that limitation.
      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.release-data.outputs.next-version }}
          HEAD_BRANCH: ${{ env.RELEASE_BRANCH_PREFIX }}${{ steps.release-data.outputs.next-version }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BODY=$(cat <<EOF
          Automated pre-release PR for version \`$VERSION\`.
          EOF
          )
          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "chore(release): prepare $VERSION" \
            --body "$BODY" \
            --label release
