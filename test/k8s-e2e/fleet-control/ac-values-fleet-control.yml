# Cluster and License info is set with "--set" in the e2e-spec file
toolkitImage:
  tag: failIfNotReplaced
agentControlDeployment:
  chartValues:
    image:
      tag: failIfNotReplaced
    subAgentsNamespace: "newrelic-agents"
    # NOTE: nrStaging is set by Tiltfile based on REGION env var (staging vs US)
    systemIdentity:
      create: false
      secretName: "sys-identity"

    config:
      authSecret:
        secretName: "sys-identity"
        secretKeyName: "private_key"
      fleet_control:
        enabled: true
        # Fleet with name 'ac-e2e-3'. The sub-agent reports data to the 'Agent Control Canaries' account.
        # NOTE: This fleet_id is provided by region-specific values file (ac-values-fleet-control-<region>.yml)
      log:
        level: debug
      agents:
        infra:
          agent_type: newrelic/com.newrelic.infrastructure:0.1.0
    agentsConfig:
      infra:
        chart_version: "*" # Use latest
        chart_values:
          # NOTE: nrStaging is set by Tiltfile based on REGION env var (staging vs US)
          global: # add 'cluster_name' (nri-kubernetes events have 'clusterName' attribute)
            customAttributes:
              cluster_name: ${nr-env:NR_CLUSTER_NAME}
              config_origin: local
