description: E2E Test

custom_test_key: k8s.cluster.name

scenarios:
  - description: Deploy eBPF Agent
    before:
      - echo The cluster name of the test is ${SCENARIO_TAG}
      - sudo apt-get install linux-headers-$(uname -r)
      - sudo ls /usr/src/linux-headers-$(uname -r)/include
      - cd ../../../ && SA_CHART_VALUES_FILE="test/k8s-e2e/ebpf/ac-values-ebpf.yml" CLUSTER=${SCENARIO_TAG} USE_LATEST_FLUX=${USE_LATEST_FLUX} tilt ci
    after:
      - kubectl logs --tail=-1 -l app.kubernetes.io/name=agent-control --all-containers --prefix=true
      - kubectl logs --tail=-1 -l app.kubernetes.io/instance=nr-ebpf --all-containers --prefix=true -n newrelic-agents
      - echo "=== Debugging eBPF Pod Issues ==="
      - kubectl get pods -n newrelic-agents -o wide
      - kubectl get daemonsets -n newrelic-agents -o wide
      - kubectl describe daemonset nr-ebpf-agent -n newrelic-agents
      - kubectl get events -n newrelic-agents --sort-by='.lastTimestamp'
      - kubectl describe pods -l app.kubernetes.io/instance=nr-ebpf -n newrelic-agents
      - echo "=== Node Information ==="
      - kubectl get nodes -o wide
      - kubectl describe nodes
      - echo "=== Pod Security ==="
      - kubectl get psp || echo "PSP not available"
      - kubectl get all -o wide -A | grep -i "security\|policy"
      - echo "=== end ==="
      - kubectl logs --tail=-1 -l app.kubernetes.io/instance=ebpf --all-containers --prefix=true -n newrelic-agents
      - kubectl get secrets --show-labels
      - kubectl get all -o wide
      - kubectl get helmrelease
      - kubectl get helmchart
      - helm list -a -A
      - cd ../../../ && tilt down
    tests:
      nrqls:
        # Checks that the metric exist for the test scenario, an extra where testKey (k8s.cluster.name=$SCENARIO_TAG) is always added.
        - query: "SELECT * from Metric where metricName = 'ebpf.tcp.connection_duration'"
