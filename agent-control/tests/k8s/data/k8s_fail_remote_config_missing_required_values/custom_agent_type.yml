namespace: newrelic
name: com.newrelic.test
version: 0.0.1
platform: kubernetes
protocol_version: "1.0"
variables:
  required_var:
    description: "required_var"
    type: yaml
    required: true
  non_required_var:
    description: "non_required_var"
    type: yaml
    required: false
    default: { }
deployment:
  objects:
    some-resource:
      apiVersion: v1
      kind: Secret
      metadata:
        name: some-resource
        namespace: ${nr-ac:namespace}
      StringData:
        non_required_var: ${nr-var:non_required_var}
        required_var: ${nr-var:required_var}
