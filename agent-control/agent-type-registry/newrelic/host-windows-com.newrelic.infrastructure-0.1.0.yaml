namespace: newrelic
name: com.newrelic.infrastructure
version: 0.1.0
platform: host
operating_system: windows
protocol_version: "1.0"
variables:
  config_agent:
    description: "Newrelic infra configuration"
    type: yaml
    required: false
    default: ""
  config_integrations:
    description: "map of YAML configs for the OHIs"
    type: map[string]yaml
    required: false
    default: { }
  config_logging:
    description: "map of YAML config for logging"
    type: map[string]yaml
    required: false
    default: { }
  backoff_delay:
    description: "seconds until next retry if agent fails to start"
    type: string
    required: false
    default: 20s
  health_port:
    description: "port for the Infra Agent status server"
    type: number
    required: false
    default: 18003
  oci:
    repository:
      description: "Package repository name"
      type: string
      required: false
      default: newrelic/infrastructure-agent-artifacts
      variants:
        ac_config_field: "oci_repository_urls"
        values: [ "newrelic/infrastructure-agent-artifacts" ]
  version:
    description: "Agent version"
    type: string
    required: true
deployment:
  # Infra-agent always logs to a file on Windows. To avoid duplicated logs we disable AC file logging on this platform.
  enable_file_logging: false
  health:
    interval: 30s
    initial_delay: 60s
    timeout: 5s
    http:
      path: "/v1/status/health"
      port: ${nr-var:health_port}
  packages:
    infra-agent:
      download:
        oci:
          repository: ${nr-var:oci.repository}
          version: ${nr-var:version}
          public_key_url: https://publickeys.newrelic.com/g/agent-control-oci/global/nrinfraagent/jwks.json
  filesystem:
    config:
      kind: dir
      entries:
        newrelic-infra.yaml:
          kind: file
          text: |
            ${nr-var:config_agent}
    integrations.d:
      kind: dir_content_from_map
      source: ${nr-var:config_integrations}
    logging.d:
      kind: dir_content_from_map
      source: ${nr-var:config_logging}
    # Agent data root (NRIA_AGENT_DIR). Persistent so the agent's stored data survives restarts
    newrelic-infra:
      kind: dir
      persistent: true
      entries:
        # NRIA_AGENT_TEMP_DIR: fluent-bit scratch that the agent does not clean up. Declared
        # ephemeral so AC reclaims it on every (re)start instead of letting it grow unbounded.
        tmp:
          kind: dir
        # Logging integration directory expected by fluentBit; persistent (like its parent) so any
        # state it holds survives restarts.
        newrelic-integrations:
          kind: dir
          persistent: true
          entries:
            logging:
              kind: dir
              persistent: true
  executables:
    - id: newrelic-infra
      path: ${nr-sub:packages.infra-agent.dir}\\newrelic-infra.exe
      args:
        - --config
        - "${nr-sub:filesystem_agent_dir}\\config\\newrelic-infra.yaml"
      env:
        # NRIA_AGENT_DIR and NRIA_APP_DATA_DIR are needed in order to change the root directory for the agent data on Windows.
        # This is useful to make sure that all the data generated by the agent is stored inside the AC managed filesystem directory.
        # Otherwise, a user could write data to a folder with lower permissions and potentially escalate privileges.
        # For the same reason we are also changing the location of the integration binaries.
        NRIA_APP_DATA_DIR: "${nr-sub:filesystem_agent_dir}\\newrelic-infra"
        NRIA_AGENT_DIR: "${nr-sub:filesystem_agent_dir}\\newrelic-infra"
        NRIA_AGENT_TEMP_DIR: "${nr-sub:filesystem_agent_dir}\\newrelic-infra\\tmp"
        # On windows, logs are written to 'NRIA_APP_DATA_DIR/newrelic-infra.log' and this cannot be disabled.
        # To avoid disks exhaustion issues, a default log rotation policy is applied to this log file.
        NRIA_LOG_ROTATE_MAX_SIZE_MB: "50"
        NRIA_LOG_ROTATE_MAX_FILES: "5"
        NRIA_CUSTOM_PLUGIN_INSTALLATION_DIR: "${nr-sub:packages.infra-agent.dir}\\integrations"
        NRIA_SAFE_BIN_DIR: "${nr-sub:packages.infra-agent.dir}\\integrations"
        # Config folders where integrations and logging configs parsed from local/remote values are stored and looked for.
        NRIA_PLUGIN_DIR: "${nr-sub:filesystem_agent_dir}\\integrations.d"
        NRIA_LOGGING_CONFIGS_DIR: "${nr-sub:filesystem_agent_dir}\\logging.d"
        # Where fluent-bit exe is installed
        NRIA_LOGGING_BIN_DIR: "${nr-sub:packages.infra-agent.dir}\\logging"
        # Where parsers.conf and out_newrelic.so are placed and fb.db will be created
        NRIA_LOGGING_HOME_DIR: "${nr-sub:packages.infra-agent.dir}\\logging"
        NRIA_STATUS_SERVER_ENABLED: true
        NRIA_STATUS_SERVER_PORT: "${nr-var:health_port}"
        NR_HOST_ID: "${nr-ac:host_id}"
      restart_policy:
        backoff_strategy:
          type: fixed
          backoff_delay: ${nr-var:backoff_delay}
