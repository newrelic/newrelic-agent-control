namespace: newrelic
name: com.newrelic.opentelemetry.collector
version: 0.1.0
variables:
  linux:
    nr_account_id:
      description: "New Relic account ID for flow data ingestion"
      type: string
      required: true
    container_name:
      description: "Name of the Docker container running ktranslate"
      type: string
      required: false
      default: "ktranslate-flow"
    flow_port:
      description: "UDP port to listen for network flow data (NetFlow/sFlow/IPFIX)"
      type: number
      required: false
      default: 9995
    backoff_delay:
      description: "seconds until next retry if agent fails to start"
      type: string
      required: false
      default: 20s
deployment:
  linux:
    health:
      interval: 30s
      initial_delay: 60s
      timeout: 10s
      cmd:
        command: "docker inspect --format='{{.State.Running}}' ${nr-var:container_name}"
        healthy_codes: [ 0 ]
    version:
      path: /usr/bin/docker
      args:
        - inspect
        - --format={{.Config.Image}}
        - ${nr-var:container_name}
      regex: v\d+
    executables:
      - id: ktranslate-flow
        path: /usr/bin/docker
        args:
          - run
          - --name=${nr-var:container_name}
          - --rm
          - --net=host
          - -e
          - NEW_RELIC_API_KEY=${nr-env:NEW_RELIC_LICENSE_KEY}
          - kentik/ktranslate:v2
          - -snmp
          - /snmp-base.yaml
          - -nr_account_id=${nr-var:nr_account_id}
          - -metrics=jchf
          - -tee_logs=true
          - -flow_only=true
          - -nf.port=${nr-var:flow_port}
          - -service_name=${nr-var:container_name}
          - nr1.flow
        env:
          OTEL_RESOURCE_ATTRIBUTES: "host.id=${nr-ac:host_id}"
        restart_policy:
          backoff_strategy:
            type: fixed
            backoff_delay: ${nr-var:backoff_delay}
