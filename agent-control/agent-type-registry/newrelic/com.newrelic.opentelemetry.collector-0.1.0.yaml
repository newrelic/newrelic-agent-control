namespace: newrelic
name: com.newrelic.opentelemetry.collector
version: 0.1.0
variables:
  linux:
    agent_dir:
      description: "Base directory where the discovery agent binary and model are located"
      type: string
      required: false
      default: "/tmp"
    backoff_delay:
      description: "seconds until next retry if agent fails to start"
      type: string
      required: false
      default: 20s
deployment:
  linux:
    health:
      interval: 30s
      initial_delay: 60s
      timeout: 10s
      cmd:
        command: "${nr-var:agent_dir}/nr-classifier-discovery-agent --model ${nr-var:agent_dir}/classifier.bin --scan --format json"
        healthy_codes: [ 0 ]
    version:
      path: ${nr-var:agent_dir}/nr-classifier-discovery-agent
      args:
        - --version
      regex: v\d+
    executables:
      - id: nr-classifier-discovery-agent
        path: ${nr-var:agent_dir}/nr-classifier-discovery-agent
        args:
          - --model
          - ${nr-var:agent_dir}/classifier.bin
          - --scan
          - --format
          - json
        restart_policy:
          backoff_strategy:
            type: fixed
            backoff_delay: ${nr-var:backoff_delay}
